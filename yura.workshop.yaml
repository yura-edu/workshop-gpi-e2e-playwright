# yura.workshop.yaml — declarative grader config
# Spec: docs/grader-workers-spec.md §6
# Generated from prisma/seeds/workshop-templates.seed.ts

schema_version: "1.0"
workshop:
  id: gpi-e2e-playwright
  title: "E2E Testing con Playwright"
  type: testing
  language: typescript
  passing_threshold: 70
  base_branch: main
submission:
  source: workshop_link
  required_inputs:
    - type: github_repo_url
      label: "URL del repositorio"
      required: true
    - type: github_pr_url
      label: "URL del Pull Request"
      required: true
evaluation_profile:
  - metric_id: e2e_test_presence
    weight: 25
    threshold: 1
    config:
      paths:
        - tests/e2e/
        - e2e/
        - "playwright.config.*"
      match_mode: any
  - metric_id: test_pass_rate
    weight: 30
    threshold: 1
    config:
      runner: vitest
      report_format: vitest_json
      report_path: reports/test-results.json
      min_pass_rate_percent: 100
      timeout_seconds: 300
  - metric_id: ci_pipeline_passes
    weight: 25
    threshold: 1
    config:
      provider: github_actions
      required_workflows: []
      mode: all_required_pass
      timeout_minutes_after_submit: 10
  - metric_id: test_pyramid_ratio
    weight: 20
    threshold: 0.6
    config:
      min_ratio: 0.6
